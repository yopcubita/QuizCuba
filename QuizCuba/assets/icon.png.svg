<svg viewBox="0 0 1024 1034" xmlns="http://www.w3.org/2000/svg" width="200" height="201.95">
  <!-- Fondo azul oscuro -->
  <rect width="1024" height="1024" rx="220" fill="#0D1B2A" style="fill:rgb(13, 27, 42);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Círculo rojo -->
  <circle cx="512" cy="460" r="330" fill="#CC1C2A" style="fill:rgb(204, 28, 42);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Círculo azul interior -->
  <circle cx="512" cy="460" r="250" fill="#1A3A6B" style="fill:rgb(26, 58, 107);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Letra Q blanca -->
  <text x="512" y="560" text-anchor="middle" font-family="Georgia, serif" font-size="340" font-weight="bold" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:340px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Q</text>

  <!-- Cola de la Q -->
  <rect x="600" y="555" width="100" height="50" rx="25" fill="#FF3344" transform="rotate(45 650 580)" style="fill:rgb(255, 51, 68);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Estrella cubana blanca (5 puntas) centrada arriba de la Q -->
  <polygon points="512,170 532,230 595,230 545,268 565,328 512,290 459,328 479,268 429,230 492,230" fill="white" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Texto QUIZ CUBA abajo -->
  <text x="512" y="830" text-anchor="middle" font-family="Arial, sans-serif" font-size="85" font-weight="bold" fill="white" letter-spacing="6" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:85px;font-weight:700;text-anchor:middle;dominant-baseline:auto">QUIZ CUBA</text>
</svg>